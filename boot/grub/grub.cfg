#####################################################################
# BASIC CONFIG
#####################################################################

# Arch Linux - path to the partition holding ISO images (using UUID)
probe -u $root --set=rootuuid
set imgdevpath="/dev/disk/by-uuid/$rootuuid"

# Arch Linux - Get a human readable platform identifier
if [ "${grub_platform}" == 'efi' ]; then
    iso_platform='UEFI'
    if [ "${grub_cpu}" == 'x86_64' ]; then
        iso_platform="x64 ${iso_platform}"
    elif [ "${grub_cpu}" == 'i386' ]; then
        iso_platform="IA32 ${iso_platform}"
    else
        iso_platform="${grub_cpu} ${iso_platform}"
    fi
elif [ "${grub_platform}" == 'pc' ]; then
    iso_platform='BIOS'
else
    iso_platform="${grub_cpu} ${grub_platform}"
fi

# Artix Linux - bootlang
if [ -z "${def_bootlang}" ]; then
    def_bootlang="en_US"
    def_keyboard="us"
    def_timezone="UTC"
fi
if [ -z "${bootlang}" ]; then
    bootlang="lang=${def_bootlang}"
    keyboard="keytable=${def_keyboard}"
    timezone="tz=${def_timezone}"
fi

# Arch Linux - Set default menu entry
default=archlinux
timeout=15
timeout_style=menu

# Artix Linux - Set default menu entry
grub_theme=/boot/grub/themes/artix/theme.txt
#timeout=-1

#####################################################################
# MENU ENTRIES - MY ATTEMPT
#####################################################################

# Arch Linux
menuentry 'Arch Linux (2025 May 1)' {
    set iso_path='/images/arch/archlinux-2025.05.01-x86_64.iso'
    export iso_path
    search --set=root --file "$iso_path"
    loopback loop "$iso_path"
    root=(loop)
    configfile /boot/grub/loopback.cfg
    loopback --delete loop
}

