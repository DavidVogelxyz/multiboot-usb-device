#####################################################################
# BASIC CONFIG
#####################################################################

# path to the partition holding ISO images (using UUID)
probe -u $root --set=rootuuid
set imgdevpath="/dev/disk/by-uuid/$rootuuid"

# Get a human readable platform identifier
if [ "${grub_platform}" == 'efi' ]; then
    iso_platform='UEFI'
    if [ "${grub_cpu}" == 'x86_64' ]; then
        iso_platform="x64 ${iso_platform}"
    elif [ "${grub_cpu}" == 'i386' ]; then
        iso_platform="IA32 ${iso_platform}"
    else
        iso_platform="${grub_cpu} ${iso_platform}"
    fi
elif [ "${grub_platform}" == 'pc' ]; then
    iso_platform='BIOS'
else
    iso_platform="${grub_cpu} ${grub_platform}"
fi

# Set default menu entry
default=archlinux
timeout=15
timeout_style=menu

#####################################################################
# MENU ENTRIES - MY ATTEMPT
#####################################################################

# Arch Linux
menuentry '[loopback]archlinux-2025.05.01-x86_64.iso' {
	set iso_path='/images/arch/archlinux-2025.05.01-x86_64.iso'
	export iso_path
	search --set=root --file "$iso_path"
	loopback loop "$iso_path"
	root=(loop)
	configfile /boot/grub/loopback.cfg
	loopback --delete loop
}

# Arch Linux MemTest86+
menuentry '[loopback]archlinux-2025.05.01-x86_64.iso MemTest86+' {
	set iso_path='/images/arch/archlinux-2025.05.01-x86_64.iso'
	loopback loop $iso_path
	linux (loop)/boot/memtest86+/memtest.efi
}

# If EFI, add entry to perform memory test
if [ "${grub_platform}" == 'efi' -a "${grub_cpu}" == 'x86_64' -a -f '/boot/memtest86+/memtest.efi' ]; then
    menuentry 'Run Memtest86+ (RAM test)' --class memtest86 --class memtest --class gnu --class tool {
        set gfxpayload=800x600,1024x768
        linux /boot/memtest86+/memtest.efi
    }
fi

# If BIOS, add entry to perform memory test
if [ "${grub_platform}" == 'pc' -a -f '/boot/memtest86+/memtest' ]; then
    menuentry 'Run Memtest86+ (RAM test)' --class memtest86 --class memtest --class gnu --class tool {
        set gfxpayload=800x600,1024x768
        linux /boot/memtest86+/memtest
    }
fi

# If EFI, add entries for EFI shell and firmware settings
if [ "${grub_platform}" == 'efi' ]; then
    if [ "${grub_cpu}" == 'x86_64' -a -f '/shellx64.efi' ]; then
        menuentry 'UEFI Shell' --class efi {
            chainloader /shellx64.efi
        }
    elif [ "${grub_cpu}" == "i386" -a -f '/shellia32.efi' ]; then
        menuentry 'UEFI Shell' --class efi {
            chainloader /shellia32.efi
        }
    fi

    menuentry 'UEFI Firmware Settings' --id 'uefi-firmware' {
        fwsetup
    }
fi

# Shutdown
menuentry 'System shutdown' --class shutdown --class poweroff {
    echo 'System shutting down...'
    halt
}

# Reboot
menuentry 'System restart' --class reboot --class restart {
    echo 'System rebooting...'
    reboot
}
